version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zappqui-auth-app
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-auth:5432/zappqui_auth
      SPRING_DATASOURCE_USERNAME: zappqui
      SPRING_DATASOURCE_PASSWORD: zappqui123
      SPRING_REDIS_HOST: redis-auth
      SPRING_REDIS_PORT: 6379
    ports:
      - "8081:8080"
    depends_on:
      postgres-auth:
        condition: service_healthy
      redis-auth:
        condition: service_healthy
    networks:
      - zappqui-network

  postgres-auth:
    image: postgres:17-alpine
    container_name: zappqui-auth-db
    environment:
      POSTGRES_DB: zappqui_auth
      POSTGRES_USER: zappqui
      POSTGRES_PASSWORD: zappqui123
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "5433:5432"
    volumes:
      - postgres-auth-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zappqui"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zappqui-network

  redis-auth:
    image: redis:7-alpine
    container_name: zappqui-auth-redis
    ports:
      - "6379:6379"
    networks:
      - zappqui-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  postgres-auth-data:

networks:
  zappqui-network:
    driver: bridge